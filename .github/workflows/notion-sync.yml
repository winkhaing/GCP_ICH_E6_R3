name: Sync Notion → GitHub Pages

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Notion sync
        env:
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID:     ${{ secrets.NOTION_PAGE_ID }}
          NOTION_COURSE_1_ID: ${{ secrets.NOTION_COURSE_1_ID }}
          NOTION_COURSE_2_ID: ${{ secrets.NOTION_COURSE_2_ID }}
        run: python scripts/notion_sync.py

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add -A docs/
          git diff --cached --quiet || git commit -m "🔄 Sync from Notion [skip ci]"
          git push
